<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>裁剪压缩工具（9:14+方框颜色切换）</title>
<style>
  body{margin:0;background:#fff;color:#333;font-family:Arial}
  .container{max-width:500px;margin:20px auto;padding:0 10px}
  
  .upload{
    text-align:center;padding:30px;border:2px dashed #ccc;
    border-radius:16px;cursor:pointer;background:#f9f9f9;margin-bottom:15px
  }
  #preview{
    display:block;margin:10px auto;max-width:50%;max-height:180px;
    border:1px solid #eee;border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08)
  }
  .btns{
    text-align:center;margin:10px 0;display:flex;flex-wrap:wrap;
    gap:8px;justify-content:center
  }
  button{
    padding:8px 16px;border:none;border-radius:20px;
    color:#fff;font-size:14px;cursor:pointer;transition:0.2s
  }
  button:hover{opacity:0.9}

  #toggleTool{background:#34c759}
  #toggleSize{background:#007aff}
  #actionBtn{background:#ff3b30}
  #cropCompressBtn{background:#ff9500}
  #autoCropBtn{background:#ff6b00}
  #toggleBoxColor{background:#8e8e93}
  #download{display:none;background:#007aff}

  .tip-text{
    text-align:center;
    font-size:13px;
    color:#666;
    margin:8px 0;
    line-height:1.4;
  }

  .crop-wrap{
    position:relative;margin:10px auto;width:100%;display:none;
  }
  #cropImg{
    width:100%;display:block;user-select:none
  }
  #cropMask{
    position:absolute;top:0;left:0;right:0;bottom:0;
    user-select:none;
    touch-action:none;
  }
  #cropBox{
    position:absolute;
    border:2px solid #fff;
    user-select:none;
  }

  .size-modal{
    position:fixed;
    top:0;left:0;right:0;bottom:0;
    background:rgba(0,0,0,0.5);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:9999;
  }
  .size-content{
    background:#fff;
    padding:20px;
    border-radius:16px;
    text-align:center;
    width:80%;
    max-width:300px;
  }
  .size-option{
    padding:12px;
    margin:8px 0;
    background:#f5f5f5;
    border-radius:12px;
    cursor:pointer;
    transition:0.2s;
  }
  .size-option:hover{
    background:#e5e5f5;
  }
  .size-option.active{
    background:#007aff;
    color:#fff;
  }
</style>
</head>
<body>

<div class="size-modal" id="sizeModal">
  <div class="size-content">
    <h3 style="margin:0 0 15px 0">选择输出尺寸</h3>
    <div class="size-option" data-w="180" data-h="280">180 × 280</div>
    <div class="size-option" data-w="450" data-h="700">450 × 700</div>
    <div class="size-option" data-w="900" data-h="1400">900 × 1400</div>
  </div>
</div>

<div class="container">
  <div class="upload" id="upload">点击上传图片</div>
  <input type="file" id="file" accept="image/*" style="display:none">

  <div class="btns">
    <button id="toggleTool">切换到：图片压缩</button>
    <button id="toggleSize">选择尺寸</button>
    <button id="actionBtn">裁剪</button>
    <button id="cropCompressBtn">压缩并且裁切</button>
    <button id="autoCropBtn">自动裁剪</button>
    <button id="toggleBoxColor">切换方框颜色</button>
    <button id="download">下载</button>
  </div>

  <div class="tip-text">
    请把图片剪辑成 9:16 再使用本工具比较合适。
  </div>

  <div class="crop-wrap" id="cropWrap">
    <img id="cropImg">
    <div id="cropMask"><div id="cropBox"></div></div>
  </div>

  <img id="preview">
</div>

<script>
const sizeModal = document.getElementById('sizeModal')
const sizeOptions = document.querySelectorAll('.size-option')

const file = document.getElementById('file')
const upload = document.getElementById('upload')
const preview = document.getElementById('preview')
const toggleToolBtn = document.getElementById('toggleTool')
const toggleSizeBtn = document.getElementById('toggleSize')
const actionBtn = document.getElementById('actionBtn')
const cropCompressBtn = document.getElementById('cropCompressBtn')
const autoCropBtn = document.getElementById('autoCropBtn')
const toggleBoxColorBtn = document.getElementById('toggleBoxColor')
const downloadBtn = document.getElementById('download')

const cropWrap = document.getElementById('cropWrap')
const cropImg = document.getElementById('cropImg')
const cropMask = document.getElementById('cropMask')
const cropBox = document.getElementById('cropBox')

let mode = 'crop'
let W = 450, H = 700
let img = new Image()
let canvas = document.createElement('canvas')
let ctx = canvas.getContext('2d')
let resultUrl = ''
let boxIsWhite = true

let cropRect = { x: 0, y: 0, w: 0, h: 0 }
let startX, startY, isMove = false
let lastDist = 0
const RATIO = 9 / 14

// 方框颜色切换
toggleBoxColorBtn.onclick = () => {
  boxIsWhite = !boxIsWhite
  cropBox.style.borderColor = boxIsWhite ? '#fff' : '#000'
  toggleBoxColorBtn.innerText = boxIsWhite ? '切换为黑色方框' : '切换为白色方框'
}

toggleToolBtn.onclick = () => {
  if (mode === 'crop') {
    mode = 'compress'
    toggleToolBtn.innerText = '切换到：图片裁剪'
    actionBtn.innerText = '压缩'
    toggleSizeBtn.style.display = 'none'
    autoCropBtn.style.display = 'none'
    toggleBoxColorBtn.style.display = 'none'
    cropWrap.style.display = 'none'
  } else {
    mode = 'crop'
    toggleToolBtn.innerText = '切换到：图片压缩'
    actionBtn.innerText = '裁剪'
    toggleSizeBtn.style.display = 'inline-block'
    autoCropBtn.style.display = 'inline-block'
    toggleBoxColorBtn.style.display = 'inline-block'
    if(img.src) cropWrap.style.display = 'block'
  }
  downloadBtn.style.display = 'none'
}

toggleSizeBtn.onclick = () => {
  sizeModal.style.display = 'flex'
  sizeOptions.forEach(opt => {
    const w = parseInt(opt.dataset.w)
    const h = parseInt(opt.dataset.h)
    if(w === W && h === H) opt.classList.add('active')
    else opt.classList.remove('active')
  })
}

sizeOptions.forEach(opt => {
  opt.onclick = () => {
    W = parseInt(opt.dataset.w)
    H = parseInt(opt.dataset.h)
    toggleSizeBtn.innerText = `${W} × ${H}`
    sizeModal.style.display = 'none'
    if(mode === 'crop' && img.src) initCropBox()
  }
})

sizeModal.onclick = (e) => {
  if(e.target === sizeModal) sizeModal.style.display = 'none'
}

upload.onclick = () => {
  file.click()
}

file.onchange = e => {
  const f = e.target.files[0]
  if(!f) return
  const reader = new FileReader()
  reader.onload = ev => {
    img.src = ev.target.result
    img.onload = () => {
      preview.src = img.src
      cropImg.src = img.src
      cropWrap.style.display = mode === 'crop' ? 'block' : 'none'
      initCropBox()
      downloadBtn.style.display = 'none'
    }
  }
  reader.readAsDataURL(f)
}

function initCropBox(){
  const wrapW = cropMask.clientWidth
  const wrapH = cropMask.clientHeight
  let w = wrapW * 0.7
  let h = w / RATIO
  if (h > wrapH * 0.9) {
    h = wrapH * 0.9
    w = h * RATIO
  }
  cropRect.w = w
  cropRect.h = h
  cropRect.x = (wrapW - w)/2
  cropRect.y = (wrapH - h)/2
  updateCropBox()
}

function updateCropBox(){
  cropBox.style.left = cropRect.x + 'px'
  cropBox.style.top = cropRect.y + 'px'
  cropBox.style.width = cropRect.w + 'px'
  cropBox.style.height = cropRect.h + 'px'
}

function clampRect(){
  const wrapW = cropMask.clientWidth
  const wrapH = cropMask.clientHeight
  if (cropRect.w > wrapW) cropRect.w = wrapW
  if (cropRect.h > wrapH) cropRect.h = wrapH
  cropRect.x = Math.max(0, Math.min(cropRect.x, wrapW - cropRect.w))
  cropRect.y = Math.max(0, Math.min(cropRect.y, wrapH - cropRect.h))
}

function startDrag(e){
  e.preventDefault()
  isMove = true
  const p = getPos(e)
  startX = p.x - cropRect.x
  startY = p.y - cropRect.y
}

function dragMove(e){
  if(!isMove) return
  e.preventDefault()
  const p = getPos(e)
  cropRect.x = p.x - startX
  cropRect.y = p.y - startY
  clampRect()
  updateCropBox()
}

function getPinchDist(e){
  const t = e.touches
  const dx = t[0].clientX - t[1].clientX
  const dy = t[0].clientY - t[1].clientY
  return Math.sqrt(dx*dx + dy*dy)
}

function startPinch(e){
  e.preventDefault()
  lastDist = getPinchDist(e)
}

function pinchMove(e){
  e.preventDefault()
  const dist = getPinchDist(e)
  const scale = dist / lastDist
  lastDist = dist
  const wrapW = cropMask.clientWidth
  const wrapH = cropMask.clientHeight
  let newW = cropRect.w * scale
  let newH = newW / RATIO
  if (newW < 60) newW = 60
  if (newH < 60) newH = 60
  if (newW > wrapW) newW = wrapW
  if (newH > wrapH) newH = wrapH
  const cx = cropRect.x + cropRect.w/2
  const cy = cropRect.y + cropRect.h/2
  cropRect.w = newW
  cropRect.h = newH
  cropRect.x = cx - newW/2
  cropRect.y = cy - newH/2
  clampRect()
  updateCropBox()
}

function getPos(e){
  if(e.type.includes('mouse')){
    return {x:e.clientX, y:e.clientY}
  }else{
    return {x:e.touches[0].clientX, y:e.touches[0].clientY}
  }
}

cropMask.addEventListener('mousedown', startDrag)
cropMask.addEventListener('touchstart', (e)=>{
  if(e.touches.length === 1) startDrag(e)
  else startPinch(e)
})

document.addEventListener('mousemove', dragMove)
document.addEventListener('touchmove', (e)=>{
  if(e.touches.length === 1) dragMove(e)
  else pinchMove(e)
})

document.addEventListener('mouseup', ()=> isMove=false)
document.addEventListener('touchend', ()=> isMove=false)

actionBtn.onclick = () => {
  if (!img.src) return alert('先上传图片')
  if(mode === 'crop') doCrop()
  else doCompress()
  downloadBtn.style.display = 'inline-block'
}

function doCrop(){
  const scale = img.width / cropImg.clientWidth
  const sx = cropRect.x * scale
  const sy = cropRect.y * scale
  const sw = cropRect.w * scale
  const sh = cropRect.h * scale
  canvas.width = W
  canvas.height = H
  ctx.clearRect(0,0,W,H)
  ctx.drawImage(img, sx, sy, sw, sh, 0,0, W,H)
  resultUrl = canvas.toDataURL('image/png')
  preview.src = resultUrl
}

function doCompress(){
  canvas.width = img.width
  canvas.height = img.height
  ctx.clearRect(0,0,img.width,img.height)
  ctx.drawImage(img,0,0)
  resultUrl = canvas.toDataURL('image/png')
  preview.src = resultUrl
}

cropCompressBtn.onclick = () => {
  if (!img.src) return alert('先上传图片')
  const scale = img.width / cropImg.clientWidth
  const sx = cropRect.x * scale
  const sy = cropRect.y * scale
  const sw = cropRect.w * scale
  const sh = cropRect.h * scale
  canvas.width = W
  canvas.height = H
  ctx.clearRect(0,0,W,H)
  ctx.drawImage(img, sx,sy,sw,sh, 0,0,W,H)
  resultUrl = canvas.toDataURL('image/png')
  preview.src = resultUrl
  downloadBtn.style.display = 'inline-block'
}

autoCropBtn.onclick = () => {
  if (!img.src) return alert('先上传图片')
  autoCrop()
  downloadBtn.style.display = 'inline-block'
}

function autoCrop() {
  const imgW = img.width
  const imgH = img.height
  let cropW, cropH
  if (imgW / imgH > RATIO) {
    cropH = imgH
    cropW = cropH * RATIO
  } else {
    cropW = imgW
    cropH = cropW / RATIO
  }
  const sx = (imgW - cropW) / 2
  const sy = (imgH - cropH) / 2
  canvas.width = W
  canvas.height = H
  ctx.clearRect(0,0,W,H)
  ctx.drawImage(img, sx, sy, cropW, cropH, 0, 0, W, H)
  resultUrl = canvas.toDataURL('image/png')
  preview.src = resultUrl
}

downloadBtn.onclick = () => {
  const a = document.createElement('a')
  a.download = 'crop_transparent.png'
  a.href = resultUrl
  a.click()
}
</script>
</body>
</html>
